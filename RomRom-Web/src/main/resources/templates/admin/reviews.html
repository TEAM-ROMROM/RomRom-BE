<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title layout:fragment="title">후기 관리</title>
</head>
<body>
<div layout:fragment="content">
    <!-- 필터 바 -->
    <div class="card bg-base-100 shadow mb-4">
        <div class="card-body py-3">
            <div class="flex flex-wrap items-end gap-3">
                <div>
                    <label class="label label-text text-xs py-0">평점</label>
                    <select id="filterRating" class="select select-bordered select-sm">
                        <option value="">전체</option>
                        <option value="GREAT">최고예요</option>
                        <option value="GOOD">좋아요</option>
                        <option value="BAD">별로예요</option>
                    </select>
                </div>
                <div>
                    <label class="label label-text text-xs py-0">블라인드</label>
                    <select id="filterBlinded" class="select select-bordered select-sm">
                        <option value="">전체</option>
                        <option value="true">블라인드만</option>
                        <option value="false">정상만</option>
                    </select>
                </div>
                <div>
                    <label class="label label-text text-xs py-0">시작일</label>
                    <input type="date" id="filterStartDate" class="input input-bordered input-sm"/>
                </div>
                <div>
                    <label class="label label-text text-xs py-0">종료일</label>
                    <input type="date" id="filterEndDate" class="input input-bordered input-sm"/>
                </div>
                <button type="button" id="applyFilter" class="btn btn-sm btn-primary">
                    <i data-lucide="search" class="size-4"></i> 조회
                </button>
                <span id="reviewsTotal" class="text-xs text-base-content/60 ml-auto">총 0건</span>
            </div>
        </div>
    </div>

    <!-- 목록 -->
    <div class="card bg-base-100 shadow">
        <div class="card-body">
            <div class="overflow-x-auto">
                <table class="table table-sm" id="reviewsTable">
                    <thead>
                    <tr>
                        <th>평점</th>
                        <th>한마디</th>
                        <th>작성자 → 대상자</th>
                        <th>작성일</th>
                        <th>상태</th>
                        <th>처리</th>
                    </tr>
                    </thead>
                    <tbody id="reviewsBody">
                    <tr>
                        <td colspan="6" class="text-center">
                            <span class="loading loading-spinner loading-sm"></span> 불러오는 중...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <!-- 페이지네이션 -->
            <div class="flex justify-center mt-4">
                <div class="join" id="reviewsPagination"></div>
            </div>
        </div>
    </div>

<!-- 모달은 layout:fragment="content" 안에 있어야 최종 렌더에 포함된다.
     fragment 밖에 두면 Thymeleaf Layout Dialect가 모달을 누락시켜
     getElementById로 모달 요소 접근 시 null → TypeError 발생 -->
<!-- 블라인드 처리 모달 -->
<dialog id="blindModal" class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg">후기 블라인드 처리</h3>
        <p class="py-2 text-sm text-base-content/70">
            이 후기를 블라인드 처리하면 일반 사용자에게 "관리자에 의해 블라인드 처리된 후기입니다"로 표시됩니다.
        </p>
        <input type="hidden" id="blindTargetReviewId"/>
        <label class="label label-text text-sm">블라인드 사유</label>
        <textarea id="blindReasonInput" class="textarea textarea-bordered w-full" rows="3"
                  placeholder="예: 욕설/허위/명예훼손 등"></textarea>
        <div class="modal-action">
            <button type="button" id="confirmBlind" class="btn btn-error btn-sm">블라인드 처리</button>
            <form method="dialog"><button class="btn btn-sm">취소</button></form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
<!-- 후기 상세 모달: 평점/태그/회원/거래/한마디를 한 곳에서. 데이터는 reviewsCache 재사용 -->
<dialog id="reviewDetailModal" class="modal">
    <div class="modal-box max-w-2xl">
        <h3 class="font-bold text-lg mb-3">후기 상세</h3>
        <div id="reviewDetailBody" class="space-y-4 text-sm">
            <!-- JS로 동적 렌더 -->
        </div>
        <div class="modal-action">
            <div id="reviewDetailActions"></div>
            <form method="dialog"><button class="btn btn-sm">닫기</button></form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
</div>

<th:block layout:fragment="js">
    <script>
        const REVIEW_RATING_LABEL = { GREAT: '최고예요', GOOD: '좋아요', BAD: '별로예요' };
        const REVIEW_RATING_BADGE = { GREAT: 'badge-success', GOOD: 'badge-info', BAD: 'badge-error' };

        // trades.html과 동일한 거래 상태 라벨/색상
        const TRADE_STATUS_MAP = {
            PENDING: { label: '요청대기', cls: 'badge-warning' },
            CHATTING: { label: '채팅중', cls: 'badge-info' },
            TRADE_COMPLETE_REQUESTED: { label: '완료요청', cls: 'badge-primary' },
            TRADED: { label: '거래완료', cls: 'badge-success' },
            CANCELED: { label: '취소됨', cls: 'badge-neutral' }
        };

        // 물품 한 칸: 대표 이미지(없으면 placeholder) + 물품명 + 물품 상세 링크
        function buildItemBox(item, caption) {
            if (!item) {
                return `<div class="flex-1 text-center text-base-content/40 text-xs py-4 border border-dashed rounded">${caption}: 없음</div>`;
            }
            const imageUrl = (item.itemImages && item.itemImages.length > 0) ? item.itemImages[0].imageUrl : '';
            const thumb = imageUrl
                ? `<img src="${escapeHtml(imageUrl)}" class="size-14 rounded object-cover" alt=""/>`
                : `<div class="size-14 rounded bg-base-200 flex items-center justify-center text-base-content/30"><i data-lucide="image-off" class="size-5"></i></div>`;
            const name = escapeHtml(item.itemName || '-');
            const link = item.itemId
                ? `<a href="/admin/items/${escapeHtml(item.itemId)}" class="link link-hover text-primary text-xs">${name}</a>`
                : `<span class="text-xs">${name}</span>`;
            return `
                <div class="flex-1 flex flex-col items-center gap-1 p-2 border rounded">
                    <span class="text-xs text-base-content/50">${caption}</span>
                    ${thumb}
                    ${link}
                </div>`;
        }

        let currentReviewPage = 0;
        // 행 클릭 시 추가 API 호출 없이 모달을 채우기 위해 목록 응답을 id로 캐싱
        let reviewsCache = {};

        function buildReviewFormData(pageNumber) {
            const formData = new FormData();
            const rating = document.getElementById('filterRating').value;
            const blinded = document.getElementById('filterBlinded').value;
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            if (rating) formData.append('tradeReviewRating', rating);
            if (blinded) formData.append('isBlindedFilter', blinded);
            if (startDate) formData.append('startDate', startDate);
            if (endDate) formData.append('endDate', endDate);
            formData.append('pageNumber', pageNumber);
            formData.append('pageSize', 20);
            return formData;
        }

        function loadReviews(pageNumber) {
            currentReviewPage = pageNumber;
            const tbody = document.getElementById('reviewsBody');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center"><span class="loading loading-spinner loading-sm"></span> 불러오는 중...</td></tr>';

            fetch('/api/admin/reviews/list', { method: 'POST', body: buildReviewFormData(pageNumber), credentials: 'same-origin' })
                .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
                .then(data => renderReviews(data))
                .catch(e => {
                    console.error('후기 목록 로드 실패:', e);
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-error">로드 실패</td></tr>';
                });
        }

        function renderReviews(data) {
            const tbody = document.getElementById('reviewsBody');
            const reviews = (data.reviews && data.reviews.content) ? data.reviews.content : [];
            document.getElementById('reviewsTotal').textContent = `총 ${data.totalElements != null ? data.totalElements : 0}건`;

            // 모달 재사용을 위해 캐시 갱신
            reviewsCache = {};
            reviews.forEach(review => { reviewsCache[review.tradeReviewId] = review; });

            if (reviews.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-base-content/60">후기가 없습니다.</td></tr>';
                document.getElementById('reviewsPagination').innerHTML = '';
                return;
            }

            tbody.innerHTML = reviews.map(review => {
                const isBlinded = review.blindInfo && review.blindInfo.isBlinded === true;
                const ratingKey = review.tradeReviewRating;
                const ratingBadge = `<span class="badge badge-sm ${REVIEW_RATING_BADGE[ratingKey] || ''}">${REVIEW_RATING_LABEL[ratingKey] || ratingKey || '-'}</span>`;
                const comment = isBlinded
                    ? '<span class="text-base-content/40 italic">🔒 블라인드 처리됨</span>'
                    : escapeHtml(review.reviewComment || '-');

                // 회원이 탈퇴/삭제면 memberId가 없을 수 있으므로 있을 때만 링크
                const reviewerCell = buildMemberLink(review.reviewerMember);
                const reviewedCell = buildMemberLink(review.reviewedMember);

                let statusCell, actionCell;
                if (isBlinded) {
                    const reason = escapeHtml(review.blindInfo.blindReason || '-');
                    const blindDate = review.blindInfo.blindDate ? TimeUtils.getRelativeTime(review.blindInfo.blindDate) : '-';
                    statusCell = `<span class="badge badge-error badge-sm">블라인드</span>
                        <div class="text-xs text-base-content/50 mt-1">사유: ${reason}<br/>${blindDate}</div>`;
                    actionCell = `<button class="btn btn-xs btn-outline" onclick="event.stopPropagation(); unblindReview('${review.tradeReviewId}')">해제</button>`;
                } else {
                    statusCell = '<span class="badge badge-ghost badge-sm">정상</span>';
                    actionCell = `<button class="btn btn-xs btn-error" onclick="event.stopPropagation(); openBlindModal('${review.tradeReviewId}')">블라인드</button>`;
                }

                return `
                <tr class="cursor-pointer hover" onclick="openReviewDetailModal('${review.tradeReviewId}')">
                    <td>${ratingBadge}</td>
                    <td class="max-w-xs truncate">${comment}</td>
                    <td class="text-sm">${reviewerCell} <span class="text-base-content/40">→</span> ${reviewedCell}</td>
                    <td class="text-sm text-base-content/60">${TimeUtils.getRelativeTime(review.createdDate)}</td>
                    <td>${statusCell}</td>
                    <td>${actionCell}</td>
                </tr>`;
            }).join('');

            renderReviewPagination(data.totalPages || 0, data.currentPage || 0);
            lucide.createIcons();
        }

        // memberId 있을 때만 회원 상세 링크. 행 클릭(모달)과 분리하기 위해 stopPropagation.
        function buildMemberLink(member) {
            const nickname = escapeHtml(member?.nickname || '익명');
            if (member && member.memberId) {
                return `<a href="/admin/members/${escapeHtml(member.memberId)}" class="link link-hover text-primary"
                           onclick="event.stopPropagation()">${nickname}</a>`;
            }
            return nickname;
        }

        function renderReviewPagination(totalPages, current) {
            const pagination = document.getElementById('reviewsPagination');
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            let html = '';
            for (let i = 0; i < totalPages; i++) {
                html += `<button class="join-item btn btn-sm ${i === current ? 'btn-active' : ''}" onclick="loadReviews(${i})">${i + 1}</button>`;
            }
            pagination.innerHTML = html;
        }

        function openReviewDetailModal(reviewId) {
            const review = reviewsCache[reviewId];
            if (!review) { console.warn('캐시에 후기 없음:', reviewId); return; }

            const isBlinded = review.blindInfo && review.blindInfo.isBlinded === true;
            const ratingKey = review.tradeReviewRating;
            const ratingBadge = `<span class="badge ${REVIEW_RATING_BADGE[ratingKey] || ''}">${REVIEW_RATING_LABEL[ratingKey] || ratingKey || '-'}</span>`;

            // 세부 평가 태그 뱃지 목록
            const tags = Array.isArray(review.tradeReviewTags) ? review.tradeReviewTags : [];
            const tagsHtml = tags.length > 0
                ? tags.map(tag => `<span class="badge badge-outline badge-sm">${escapeHtml(tag)}</span>`).join(' ')
                : '<span class="text-base-content/40">없음</span>';

            // 작성자/대상자 회원 링크 (기존 buildMemberLink 재사용)
            const reviewerLink = buildMemberLink(review.reviewerMember);
            const reviewedLink = buildMemberLink(review.reviewedMember);

            // 연결된 거래
            const trh = review.tradeRequestHistory;
            let tradeHtml;
            if (trh) {
                const statusKey = trh.tradeStatus;
                const statusInfo = TRADE_STATUS_MAP[statusKey] || { label: statusKey || '-', cls: 'badge-ghost' };
                const tradeLink = trh.tradeRequestHistoryId
                    ? `<a href="/admin/trades/${escapeHtml(trh.tradeRequestHistoryId)}" class="link link-hover text-primary text-xs" onclick="event.stopPropagation()">거래 상세 보기 →</a>`
                    : '';
                tradeHtml = `
                    <div class="flex items-center gap-2 mb-2">
                        <span class="badge ${statusInfo.cls} badge-sm">${statusInfo.label}</span>
                        ${tradeLink}
                    </div>
                    <div class="flex items-stretch gap-2">
                        ${buildItemBox(trh.giveItem, '주는 물품')}
                        <div class="flex items-center text-base-content/30"><i data-lucide="arrow-left-right" class="size-4"></i></div>
                        ${buildItemBox(trh.takeItem, '받는 물품')}
                    </div>`;
            } else {
                tradeHtml = '<div class="text-base-content/40 text-xs">연결된 거래 정보 없음</div>';
            }

            // 한마디(블라인드면 마스킹 안내 + 원본 사유/시각)
            let commentHtml;
            if (isBlinded) {
                const reason = escapeHtml(review.blindInfo.blindReason || '-');
                const blindDate = review.blindInfo.blindDate ? TimeUtils.formatDate(review.blindInfo.blindDate) : '-';
                commentHtml = `
                    <div class="alert alert-warning text-xs py-2">🔒 블라인드 처리됨 — 일반 사용자에게는 "관리자에 의해 블라인드 처리된 후기입니다"로 표시</div>
                    <div class="mt-1 text-xs text-base-content/60">처리 사유: ${reason} · 처리 시각: ${blindDate}</div>
                    <div class="mt-2 p-2 bg-base-200 rounded text-base-content/70">원본 한마디: ${escapeHtml(review.reviewComment || '-')}</div>`;
            } else {
                commentHtml = `<div class="p-2 bg-base-200 rounded">${escapeHtml(review.reviewComment || '-')}</div>`;
            }

            document.getElementById('reviewDetailBody').innerHTML = `
                <div class="flex items-center gap-2">${ratingBadge}
                    <span class="text-base-content/50 text-xs ml-auto">${TimeUtils.formatDate(review.createdDate)}</span></div>
                <div><div class="text-xs text-base-content/50 mb-1">세부 평가</div>${tagsHtml}</div>
                <div><div class="text-xs text-base-content/50 mb-1">작성자 → 대상자</div>
                    <div>${reviewerLink} <span class="text-base-content/40">→</span> ${reviewedLink}</div></div>
                <div><div class="text-xs text-base-content/50 mb-1">연결된 거래</div>${tradeHtml}</div>
                <div><div class="text-xs text-base-content/50 mb-1">한마디</div>${commentHtml}</div>`;

            // 모달 내 블라인드/해제 액션
            if (isBlinded) {
                document.getElementById('reviewDetailActions').innerHTML =
                    `<button class="btn btn-sm btn-outline" onclick="unblindReviewFromModal('${reviewId}')">블라인드 해제</button>`;
            } else {
                document.getElementById('reviewDetailActions').innerHTML =
                    `<button class="btn btn-sm btn-error" onclick="document.getElementById('reviewDetailModal').close(); openBlindModal('${reviewId}')">블라인드 처리</button>`;
            }

            document.getElementById('reviewDetailModal').showModal();
            lucide.createIcons();
        }

        // 모달에서 해제: 처리 후 목록 새로고침하고 모달 닫기
        function unblindReviewFromModal(reviewId) {
            if (!confirm('이 후기의 블라인드를 해제할까요?')) return;
            const formData = new FormData();
            formData.append('tradeReviewId', reviewId);
            fetch('/api/admin/reviews/unblind', { method: 'POST', body: formData, credentials: 'same-origin' })
                .then(r => { if (!r.ok) throw new Error(r.status); return r; })
                .then(() => {
                    document.getElementById('reviewDetailModal').close();
                    loadReviews(currentReviewPage);
                })
                .catch(e => { console.error('블라인드 해제 실패:', e); alert('블라인드 해제 실패'); });
        }

        // 블라인드 모달
        function openBlindModal(reviewId) {
            document.getElementById('blindTargetReviewId').value = reviewId;
            document.getElementById('blindReasonInput').value = '';
            document.getElementById('blindModal').showModal();
        }

        document.getElementById('confirmBlind').addEventListener('click', () => {
            const reviewId = document.getElementById('blindTargetReviewId').value;
            const reason = document.getElementById('blindReasonInput').value;
            const formData = new FormData();
            formData.append('tradeReviewId', reviewId);
            if (reason) formData.append('blindReason', reason);

            fetch('/api/admin/reviews/blind', { method: 'POST', body: formData, credentials: 'same-origin' })
                .then(r => { if (!r.ok) throw new Error(r.status); return r; })
                .then(() => {
                    document.getElementById('blindModal').close();
                    loadReviews(currentReviewPage);
                })
                .catch(e => { console.error('블라인드 처리 실패:', e); alert('블라인드 처리 실패'); });
        });

        function unblindReview(reviewId) {
            if (!confirm('이 후기의 블라인드를 해제할까요?')) return;
            const formData = new FormData();
            formData.append('tradeReviewId', reviewId);
            fetch('/api/admin/reviews/unblind', { method: 'POST', body: formData, credentials: 'same-origin' })
                .then(r => { if (!r.ok) throw new Error(r.status); return r; })
                .then(() => loadReviews(currentReviewPage))
                .catch(e => { console.error('블라인드 해제 실패:', e); alert('블라인드 해제 실패'); });
        }

        document.getElementById('applyFilter').addEventListener('click', () => loadReviews(0));

        loadReviews(0);
    </script>
</th:block>
</body>
</html>
